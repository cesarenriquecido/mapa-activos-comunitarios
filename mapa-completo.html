// Crear marcadores para cada recurso
recursos.forEach((recurso, index) => {

  let popupContent = `
    <div class="popup-content">
      <h3>${recurso.titulo}</h3>
  `;
  
  if (recurso.actividad) {
    popupContent += `<p><strong>Actividad:</strong> ${recurso.actividad}</p>`;
  }
  
  if (recurso.telefono) {
    popupContent += `<p><strong>Teléfono:</strong> <a href="tel:${recurso.telefono.replace(/\D/g, '')}">${recurso.telefono}</a></p>`;
  }
  
  if (recurso.web) {
    popupContent += `<p><strong>Web:</strong> <a href="${recurso.web}" target="_blank">Visitar</a></p>`;
  }
  
  if (recurso.tematicas && recurso.tematicas.length > 0) {
    popupContent += `<p><strong>Temáticas:</strong></p>`;
    recurso.tematicas.forEach(tematica => {
      popupContent += `<span class="tematica">${tematica}</span>`;
    });
  }
  
  if (recurso.poblacion && recurso.poblacion.length > 0) {
    popupContent += `<p><strong>Población:</strong> ${recurso.poblacion.join(', ')}</p>`;
  }
  
  if (recurso.tipo && recurso.tipo.length > 0) {
    popupContent += `<p><strong>Tipo:</strong> ${recurso.tipo.join(', ')}</p>`;
  }
  
  if (recurso.uap && recurso.uap.length > 0) {
    popupContent += `<p><strong>UAP:</strong> ${recurso.uap.join(', ')}</p>`;
  }
  
  popupContent += `</div>`;
  
  // Crear marcador
  L.marker(
    [recurso.lat, recurso.lon]
  )
  .bindPopup(popupContent)
  .addTo(map);
});
